RecipeFormatVersion: '2020-01-25'

ComponentName: com.streammanager
ComponentVersion: '1.0.4'

ComponentDescription: Greengrass resilient data ingestion with persisted queue on disk and buffering
ComponentPublisher: Dega

ComponentDependencies:
  aws.greengrass.Cli:
    VersionRequirement: ">=2.0.0"
    DependencyType: HARD

  aws.greengrass.StreamManager:
    VersionRequirement: ">=2.0.0"
    DependencyType: HARD

ComponentConfiguration:
  DefaultConfiguration:
    accessControl:
      aws.greengrass.streammanager:
        com.streammanager.bridge:
          policyDescription: "Allow Stream Manager access"
          operations:
            - aws.greengrass#PutMessage
            - aws.greengrass#GetMessages
            - aws.greengrass#ListStreams
          resources:
            - "*"

Manifests:
  - Platform:
      os: linux

    Artifacts:
      - URI: s3://greengrass-artifact-dega-test/com.streammanager/1.0.4/stream-mgr.zip
        Unarchive: ZIP

    Lifecycle:
      Run: |
        cd {artifacts:decompressedPath}/stream-mgr
        /usr/bin/node index.js